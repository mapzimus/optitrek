{% extends "base.html" %}
{% block title %}Optitrek — error{% endblock %}

{% block content %}
<div class="bg-red-50 border border-red-200 rounded-lg p-6">
  <h2 class="text-lg font-semibold text-red-900">{{ title }}</h2>
  <p class="mt-2 text-sm text-red-800 whitespace-pre-wrap font-mono">{{ message }}</p>

  {% if fix %}
  <h3 class="mt-4 text-sm font-semibold text-red-900">How to fix</h3>
  <p class="mt-1 text-sm text-red-800 whitespace-pre-wrap font-mono">{{ fix }}</p>
  {% endif %}

  <a href="/" class="inline-block mt-6 bg-white hover:bg-gray-50
                     border border-red-700 text-red-700 px-4 py-1.5 rounded">
    ← Back to form
  </a>
</div>
{% endblock %}
