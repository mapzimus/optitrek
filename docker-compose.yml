# Optitrek — OSRM routing engine
#
# Bring-up:
#   1. ./scripts/build_osrm.sh    # downloads us-latest.osm.pbf, runs the
#                                 # three osrm-backend processing stages
#   2. docker compose up -d osrm  # starts the routed server on :5000
#
# Health check:
#   curl http://localhost:5000/route/v1/driving/-77.0365,38.8977;-71.0589,42.3601
#
# Decision D3: US-only extract — prevents routing through Canada.

services:
  # FULL US network — kept for reference. Will NOT run on BRONTOSAURUS
  # (32 GB RAM is below OSRM's actual peak; caused a BSOD on 2026-05-21).
  # Use only on a cloud VM with >=64 GB RAM.
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: optitrek-osrm
    # --max-table-size raised so /table can handle a 400+ POI source batch.
    command: osrm-routed --algorithm mld --max-table-size 8000 /data/us-latest.osrm
    volumes:
      - ./data/osrm:/data
    ports:
      - "5000:5000"
    restart: unless-stopped
    profiles: ["full"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/route/v1/driving/-77.0,38.9;-77.0,38.9 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # MAJOR-ROADS network — what BRONTOSAURUS actually runs.
  # Built from the tag-filtered PBF; artifacts ~8-12 GB.
  osrm-major:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: optitrek-osrm-major
    command: osrm-routed --algorithm mld --max-table-size 8000 /data/us-major.osrm
    volumes:
      - ./data/osrm-major:/data
    ports:
      - "5000:5000"
    restart: unless-stopped
    profiles: ["major"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/route/v1/driving/-77.0,38.9;-77.0,38.9 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
